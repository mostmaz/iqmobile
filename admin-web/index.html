<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IQ Mobile Admin</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a1628;
        --card: #13243b;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #3b82f6;
        --gold: #fbbf24;
      }
      body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      h1, h2, h3 { color: #fff; }
      button { background: var(--accent); color: #fff; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; }
      button.secondary { background: #374151; }
      button.danger { background: #ef4444; }
      input { background: #1f2e47; color: #fff; border: 1px solid #374151; padding: 8px; border-radius: 4px; }
      .card { background: var(--card); padding: 16px; border-radius: 8px; margin-bottom: 12px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 8px; border-bottom: 1px solid #374151; text-align: left; }
      .pill { padding: 2px 8px; border-radius: 999px; font-size: 12px; }
      .pill.open { background: #10b981; }
      .pill.restricted { background: #f59e0b; }
      .pill.forced_open { background: #3b82f6; }
      .pill.forced_restrict { background: #ef4444; }
      a { color: var(--accent); }
      .nav { display: flex; gap: 12px; margin-bottom: 16px; }
      .nav a { padding: 6px 10px; border-radius: 4px; }
      .nav a.active { background: var(--accent); color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
